<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>钛白の个人主页</title>
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
    <script src="index.js"></script>
</head>
<body>
<div id="root">
    <div id="header">
        <img id="header_home" src="home.webp" alt="">
        <div id="header_home_blur"></div>
        <div id="header_home_info">
            <img id="header_home_info_avatar" src="avatar.webp" alt>
            <p id="header_home_info_name">钛白</p>
            <p id="header_home_info_message">一二三四五，上山打老虎</p>
            <p id="header_home_info_time"></p>
            <p id="header_home_info_date"></p>
        </div>
        <div id="header_link">
            <div id="header_link_github" onclick="window.open('https://github.com/77taibai')">
                <img src="GitHub.svg" alt="">
                <span>GitHub</span>
            </div>
        </div>
        <div id="header_tody">
            <div id="header_today_finish"></div>
        </div>
    </div>
    <div id="main">
        <div>
            <div id="main_sentence_out" class="box">
                <div id="main_sentence_in">
                    <span id="main_sentence_text"></span>
                </div>
            </div>
        </div>
        <div>
            <div>
                <div id="main_weather" class="box">
                    <iframe src="https://i.tianqi.com/?c=code&a=getcode&id=31&icon=1" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>
            <div>
                <div id="main_live" class="box">
                    <p>已在这个世界上度过了</p>
                    <p id="main_live_text"></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
